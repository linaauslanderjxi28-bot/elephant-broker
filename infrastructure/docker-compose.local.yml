services:
  neo4j:
    restart: unless-stopped
    image: neo4j:5-community
    mem_limit: 2g
    ports:
      - "17474:7474"
      - "17687:7687"
    environment:
      NEO4J_AUTH: neo4j/${EB_NEO4J_PASSWORD:?set EB_NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - /home/openclaw/docker/eb_infra/neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  qdrant:
    restart: unless-stopped
    image: qdrant/qdrant:v1.17.0
    mem_limit: 512m
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - /home/openclaw/docker/eb_infra/qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    mem_limit: 64m
    ports:
      - "16379:6379"
    volumes:
      - /home/openclaw/docker/eb_infra/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Phase 9: Observability stack (optional — for ClickHouse analytics + OTEL log export)
  otel-collector:
    restart: unless-stopped
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - clickhouse
      - jaeger
    profiles:
      - observability

  clickhouse:
    restart: unless-stopped
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ${EB_CLICKHOUSE_PASSWORD:-}
    volumes:
      - /home/openclaw/docker/eb_infra/clickhouse_data:/var/lib/clickhouse
    profiles:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  jaeger:
    restart: unless-stopped
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      SPAN_STORAGE_TYPE: memory
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - observability

  grafana:
    restart: unless-stopped
    image: grafana/grafana:latest
    ports:
      - "13000:3000"
    profiles:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    restart: unless-stopped
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: elephantbroker-minio
    mem_limit: 256m
    ports:
      - "19000:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: ${EB_MINIO_ROOT_USER:-openclaw}
      MINIO_ROOT_PASSWORD: ${EB_MINIO_ROOT_PASSWORD:?set EB_MINIO_ROOT_PASSWORD}
    volumes:
      - /home/openclaw/docker/eb_infra/minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio-setup:
    image: minio/mc:latest
    container_name: elephantbroker-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 "$${EB_MINIO_ROOT_USER:-openclaw}" "$${EB_MINIO_ROOT_PASSWORD}") do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/0-inbox || true;
      /usr/bin/mc mb myminio/ground-truth || true;
      exit 0;
      "

  # OpenClaw structured data store (采集暂存 → Hermes 清洗 → EB)
  structured-data-db:
    image: postgres:16-alpine
    container_name: elephantbroker-structured-data
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: structured_data
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: ${EB_POSTGRES_PASSWORD:?set EB_POSTGRES_PASSWORD}
    volumes:
      - /home/openclaw/docker/eb_infra/structured_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d structured_data"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  gitea:
    image: gitea/gitea:latest
    container_name: elephantbroker-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
    restart: unless-stopped
    volumes:
      - /home/openclaw/docker/eb_infra/gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "18080:3000"
      - "13022:22"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - /home/openclaw/docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://192.168.199.80:8888/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
