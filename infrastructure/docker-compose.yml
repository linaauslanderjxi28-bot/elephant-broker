services:
  neo4j:
    restart: unless-stopped
    image: neo4j:5-community
    ports:
      - "17474:7474"
      - "17687:7687"
    environment:
      # Dev/test credentials — override via EB_NEO4J_PASSWORD in production
      NEO4J_AUTH: neo4j/elephant_dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  qdrant:
    restart: unless-stopped
    image: qdrant/qdrant:v1.17.0
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Phase 9: Observability stack (optional — for ClickHouse analytics + OTEL log export)
  otel-collector:
    restart: unless-stopped
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - clickhouse
      - jaeger
    profiles:
      - observability

  clickhouse:
    restart: unless-stopped
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      # dev/staging only — use real credentials in production
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    profiles:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  jaeger:
    restart: unless-stopped
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      SPAN_STORAGE_TYPE: memory
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - observability

  grafana:
    restart: unless-stopped
    image: grafana/grafana:latest
    ports:
      - "13000:3000"
    profiles:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ElephantBroker runtime runs natively via Python venv (not containerized).
  # See docs/DEPLOYMENT.md for setup instructions.
  # Infrastructure services above are the only Docker dependencies.

volumes:
  neo4j_data:
  qdrant_data:
  redis_data:
  clickhouse_data:
