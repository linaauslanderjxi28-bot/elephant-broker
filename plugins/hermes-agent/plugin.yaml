name: elephantbroker
version: 1.1.0
description: "ElephantBroker — governed explicit-fact memory provider for NousResearch Hermes Agent; raw turns and tool output are never auto-persisted."
provider_type: memory
hooks:
  - system_prompt_block
  - prefetch
  - queue_prefetch
  - sync_turn
  - on_session_end
  - on_pre_compress
  - on_memory_write
  - shutdown
pip_dependencies: []
